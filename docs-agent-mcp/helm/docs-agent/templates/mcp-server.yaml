apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kubeflow-docs
  namespace: {{ .Values.global.namespace.app }}
spec:
  replicas: {{ .Values.mcpServer.replicaCount }}
  selector:
    matchLabels:
      app: mcp-kubeflow-docs
  template:
    metadata:
      labels:
        app: mcp-kubeflow-docs
    spec:
      imagePullSecrets:
        - name: dockerhub-registry
      containers:
        - name: mcp-server
          image: "{{ .Values.mcpServer.image.repository }}:{{ .Values.mcpServer.image.tag }}"
          imagePullPolicy: {{ .Values.mcpServer.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mcpServer.service.port }}
          env:
            - name: PORT
              value: "{{ .Values.mcpServer.service.port }}"
            - name: PYTHONUNBUFFERED
              value: "1"
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mcpServer.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mcpServer.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: {{ .Values.mcpServer.resources.requests.memory | quote }}
              cpu: {{ .Values.mcpServer.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.mcpServer.resources.limits.memory | quote }}
              cpu: {{ .Values.mcpServer.resources.limits.cpu | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-kubeflow-docs
  namespace: {{ .Values.global.namespace.app }}
spec:
  selector:
    app: mcp-kubeflow-docs
  ports:
    - port: {{ .Values.mcpServer.service.port }}
      targetPort: {{ .Values.mcpServer.service.port }}
  type: ClusterIP
