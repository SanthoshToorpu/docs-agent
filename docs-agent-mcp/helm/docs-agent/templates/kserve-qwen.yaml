apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.namespace.mlInfra }}
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: llm-runtime
  namespace: {{ .Values.global.namespace.mlInfra }}
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: true
  containers:
    - name: kserve-container
      image: {{ .Values.kserve.runtime.image | quote }}
      command: ["python", "-m", "huggingfaceserver"]
      resources:
        requests:
          cpu: {{ .Values.kserve.resources.requests.cpu | quote }}
          memory: {{ .Values.kserve.resources.requests.memory | quote }}
          nvidia.com/gpu: {{ .Values.kserve.resources.requests.gpu | quote }}
        limits:
          cpu: {{ .Values.kserve.resources.limits.cpu | quote }}
          memory: {{ .Values.kserve.resources.limits.memory | quote }}
          nvidia.com/gpu: {{ .Values.kserve.resources.limits.gpu | quote }}
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen-llm
  namespace: {{ .Values.global.namespace.mlInfra }}
  annotations:
    serving.kserve.io/storage-initializer-env: '{"HF_HUB_ENABLE_HF_TRANSFER": "0"}'
    serving.kserve.io/minReplicas: "1"
    serving.kserve.io/deploymentTimeout: "3600"
spec:
  predictor:
    model:
      modelFormat:
        name: huggingface
      runtime: llm-runtime
      args:
        - --model_name={{ .Values.kserve.inference.modelName }}
        - --model_id={{ .Values.kserve.inference.modelId }}
        - --backend={{ .Values.kserve.inference.backend }}
        - --max-model-len={{ .Values.kserve.inference.maxModelLen }}
        - --gpu-memory-utilization={{ .Values.kserve.inference.gpuMemoryUtilization }}
        - --quantization={{ .Values.kserve.inference.quantization }}
        - --enable-auto-tool-choice
        - --tool-call-parser=hermes
      resources:
        requests:
          cpu: {{ .Values.kserve.resources.requests.cpu | quote }}
          memory: {{ .Values.kserve.resources.requests.memory | quote }}
          nvidia.com/gpu: {{ .Values.kserve.resources.requests.gpu | quote }}
        limits:
          cpu: {{ .Values.kserve.resources.limits.cpu | quote }}
          memory: {{ .Values.kserve.resources.limits.memory | quote }}
          nvidia.com/gpu: {{ .Values.kserve.resources.limits.gpu | quote }}
    nodeSelector:
      nvidia.com/gpu: "true"
      disk: 150gb
    tolerations:
      - operator: "Exists"
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-llm-stable
  namespace: {{ .Values.global.namespace.mlInfra }}
spec:
  selector:
    serving.kserve.io/inferenceservice: qwen-llm
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
