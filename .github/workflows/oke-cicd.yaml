name: Build, Test, and Deploy to OKE

on:
  push:
    branches:
      - main
  pull_request:

env:
  # Registry config - Update these placeholders
  REGISTRY: <region-key>.ocir.io # e.g., iad.ocir.io or phx.ocir.io
  REPOSITORY: <tenancy-namespace>/<project-name> # e.g., mytenancy/docs-agent
  IMAGE_NAME: docs-agent
  
  # OKE Cluster ID - Update this
  OKE_CLUSTER_OCID: <your-oke-cluster-ocid>

jobs:
  # 1. CI Phase: Run Python compilation check and unit tests (on all PRs and pushes to main)
  test-and-compile:
    name: Compile and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f kagent-feast-mcp/mcp-server/requirements.txt ]; then pip install -r kagent-feast-mcp/mcp-server/requirements.txt; fi
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
          pip install pytest

      - name: Compile python files in MCP Server
        run: |
          echo "Compiling active MCP Server python files..."
          python -m py_compile kagent-feast-mcp/mcp-server/*.py

      - name: Run Unit Tests
        run: |
          if [ -d tests ]; then
            echo "Running pytest suite..."
            pytest
          else
            echo "No test suite directory found; skipping."
          fi

  # 2. CD Phase: Build Docker image and Deploy (ONLY runs on pushes to main branch)
  build-and-deploy:
    name: Build, Push, and Deploy to OKE
    needs: test-and-compile
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set a dynamic tag (e.g., using GitHub commit SHA)
      - name: Set Image Tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Login to OCI Container Registry (OCIR)
      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }} # Format: <tenancy-namespace>/<oci-username>
          password: ${{ secrets.OCIR_AUTH_TOKEN }} # An OCI Auth Token generated for the user

      # Build and push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./kagent-feast-mcp/mcp-server
          file: ./kagent-feast-mcp/mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ env.tag }}
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      # Setup OCI CLI for deployment
      - name: Install OCI CLI
        uses: oracle-actions/setup-oci-cli@v1.2.0
        with:
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-region: ${{ secrets.OCI_REGION }}
          oci-key-file: ${{ secrets.OCI_KEY_FILE }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}

      # Generate kubeconfig to access OKE
      - name: Generate Kubeconfig for OKE
        run: |
          mkdir -p ~/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ env.OKE_CLUSTER_OCID }} \
            --file ~/.kube/config \
            --region ${{ secrets.OCI_REGION }} \
            --token-version 2.0.0
          chmod 600 ~/.kube/config

      # Deploy to Kubernetes
      - name: Deploy to OKE
        run: |
          # Apply manifest files if they exist in the repository
          if [ -f kagent-feast-mcp/manifests/serving-runtime.yaml ]; then kubectl apply -f kagent-feast-mcp/manifests/serving-runtime.yaml; fi
          if [ -f kagent-feast-mcp/manifests/inference-service.yaml ]; then kubectl apply -f kagent-feast-mcp/manifests/inference-service.yaml; fi
          if [ -f gpu-pod.yaml ]; then kubectl apply -f gpu-pod.yaml; fi
          if [ -f vllm-qwen.yaml ]; then kubectl apply -f vllm-qwen.yaml; fi
