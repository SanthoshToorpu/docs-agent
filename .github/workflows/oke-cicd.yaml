name: Build, Test, and Deploy to OKE

on:
  push:
    branches:
      - pr-206
      - main
  pull_request:

env:
  # Registry config - Update these placeholders
  REGISTRY: <region-key>.ocir.io # e.g., iad.ocir.io or phx.ocir.io
  REPOSITORY: <tenancy-namespace>/<project-name> # e.g., mytenancy/docs-agent
  IMAGE_NAME: docs-agent
  
  # OKE Cluster ID - Update this
  OKE_CLUSTER_OCID: <your-oke-cluster-ocid>

jobs:
  # 1. CI Phase: Test the application first
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
          if [ -f server-https/requirements.txt ]; then pip install -r server-https/requirements.txt; fi
          pip install pytest

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          pytest

  # 2. CD Phase: Build Docker image and Deploy
  # This job only runs if the 'test' job succeeds
  build-and-deploy:
    name: Build, Push, and Deploy to OKE
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pr-206')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set a dynamic tag (e.g., using GitHub commit SHA)
      - name: Set Image Tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Login to OCI Container Registry (OCIR)
      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }} # Format: <tenancy-namespace>/<oci-username>
          password: ${{ secrets.OCIR_AUTH_TOKEN }} # An OCI Auth Token generated for the user

      # Build and push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ env.tag }}
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      # Setup OCI CLI for deployment
      - name: Install OCI CLI
        uses: oracle-actions/setup-oci-cli@v1.2.0
        with:
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-region: ${{ secrets.OCI_REGION }}
          oci-key-file: ${{ secrets.OCI_KEY_FILE }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}

      # Generate kubeconfig to access OKE
      - name: Generate Kubeconfig for OKE
        run: |
          mkdir -p ~/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ env.OKE_CLUSTER_OCID }} \
            --file ~/.kube/config \
            --region ${{ secrets.OCI_REGION }} \
            --token-version 2.0.0
          chmod 600 ~/.kube/config

      # Deploy to Kubernetes
      - name: Deploy to OKE
        run: |
          # Replace image tag in your K8s deployment manifests
          # e.g., sed -i 's/docs-agent:latest/docs-agent:${{ env.tag }}/g' k8s/deployment.yaml
          
          # Apply the manifests
          kubectl apply -f gpu-pod.yaml
          kubectl apply -f vllm-qwen.yaml
          
          # Optional: Wait for deployment rollout
          # kubectl rollout status deployment/my-deployment -n default
